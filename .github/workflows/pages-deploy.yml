name: Pages deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Verify Bundler version
        run: bundle _4.0.3_ -v

      - name: Build site
        run: |
          bundle _4.0.3_ exec jekyll clean --config site/_config.yml --source site --destination _site
          bundle _4.0.3_ exec jekyll build --config site/_config.yml --source site --destination _site

      - name: Check generated files
        run: |
          test -f _site/index.html
          test -f _site/team/index.html
          test -f _site/research/index.html
          test -f _site/research/feed.xml
          test -f _site/news/index.html
          test -f _site/news/new-office/index.html
          test -f _site/news/intro-tufa-talks/index.html
          test -f _site/assets/css/site.css
          grep -q "Tufa Labs" _site/index.html
          grep -q "Latest Posts" _site/research/index.html
          grep -q "Introducing Tufa Talks" _site/news/index.html
          grep -q "<feed" _site/research/feed.xml

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: true
          path: _site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
