---
layout: default
body_class: redirect-page
---
<section class="redirect-notice">
    <h1>{{ page.title }}</h1>
    <p>{{ page.redirect_message | default: "This page has moved." }}</p>
    <p>
        Continue to
        <a href="{{ page.redirect_url | relative_url }}">{{ page.redirect_label | default: page.redirect_url }}</a>.
    </p>
</section>
<script>
    window.location.replace({{ page.redirect_url | jsonify }});
</script>
