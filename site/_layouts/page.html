---
layout: default
---
<article class="page{% if page.page_class %} {{ page.page_class }}{% endif %}">
    {% if page.title %}
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.lede %}
        <p class="page-lede">{{ page.lede }}</p>
        {% endif %}
    </header>
    {% endif %}

    <div class="page-content">
        {{ content }}
    </div>
</article>
