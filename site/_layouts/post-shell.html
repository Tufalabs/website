<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.meta_title %}{{ page.meta_title }}{% elsif page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
    <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/favicon.png' | relative_url }}">
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
    {% feed_meta %}
    {% seo title=false %}
    <script src="{{ '/assets/js/logo.js' | relative_url }}" defer></script>
</head>
<body class="research-post-page{% if page.body_class %} {{ page.body_class }}{% endif %}">
    {% include header.html %}
    <main class="container post-container">
        {{ content }}
    </main>
</body>
</html>
