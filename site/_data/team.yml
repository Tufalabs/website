- name: Benjamin Crouzier
  role: Founder & Research Engineer
  image: /assets/images/ben.jpeg
  image_style: ""
  bio: >-
    Benjamin has a masters in Computer Science likes to build stuff.
  research_interests: >-
    test-time computation, [UED](https://arxiv.org/abs/2012.02096)/[MCC](http://www.cmap.polytechnique.fr/~nikolaus.hansen/proceedings/2017/GECCO/proceedings/proceedings_files/pap140s3-file1.pdf)/auto-curriculum, [framing problem](https://folk.idi.ntnu.no/gamback/teaching/TDT4138/dennett84.pdf),
    tokenisation, probabilistic programming, search/self-play,
    music-generation, generalization, scaling laws

- name: Mohamed Osman
  role: AI Researcher
  image: /assets/images/mohamed-closeup.webp
  image_style: ""
  bio: >-
    Mohamed has four years of work experience in developing deep learning
    models and multiple successful real-world deployments under his belt.
  research_interests: >-
    Meta learning, reasoning, test-time learning, active inference,
    few-shot learning, data scarcity

- name: Akira Yoshiyama
  role: AI Researcher
  image: /assets/images/akira.jpeg
  image_style: ""
  bio: >-
    Akira was previously focused on LLM fusion at the University of Waterloo.
    He has a diverse background in building innovative technology solutions,
    from generative machine learning applications in aerospace engineering to
    advanced CCTV footage analysis tools for law enforcement.
  research_interests: >-
    LLM fusion, generative machine learning, AI applications in security and
    law enforcement, computational design and optimization, autonomous systems

- name: Dries Smit
  role: AI Researcher
  image: /assets/images/dries.jpg
  image_style: ""
  bio: >-
    Dries is a researcher specialising in reinforcement learning, multi-agent
    systems, and large language models, with a strong track record of applying
    these techniques in medical and financial domains. Dries led the team
    behind Laila, a fine-tuned variant of Llama 3.1 designed to assist
    biologists by interfacing directly with laboratory equipment. His research currently focuses on large-scale training and reinforcement learning; follow his latest work on [driessmit.github.io](https://driessmit.github.io/).
  research_interests: >-
    Reinforcement learning, multi-agent systems, large language models,
    large-scale AI training, biomedical applications, foundational model
    enhancement, autonomous systems, curiosity-driven learning

- name: Dominique Garmier
  role: AI Researcher
  image: /assets/images/dominique.webp
  image_style: ""
  bio: >-
    Dominique has a bachelor's in mathematics and is currently pursuing his
    master's with a focus on analysis.
  research_interests: >-
    reasoning, formal proofs, statistical learning theory, functional
    analysis, ergodic theory, dynamical systems

- name: Isaiah Pressman
  role: AI Researcher
  image: /assets/images/isaiah.jpeg
  image_style: ""
  bio: >-
    Isaiah is a research engineer with a focus on self-play reinforcement
    learning and the techniques needed to train large-scale deep learning
    models. His background includes machine learning engineering for dynamic
    pricing, applying computer vision to histopathology research, and multiple
    1st- and 2nd-place finishes in Kaggle competitions.
  research_interests: >-
    self-play, reinforcement learning, in-context learning, reasoning models

- name: Jerome Sieber
  role: AI Researcher
  image: /assets/images/jerome.jpg
  image_style: "object-position: center 8%;"
  bio: |-
    Jerome is an AI researcher focusing on deep sequence model architectures
    and reasoning models. He holds a PhD in control theory from ETH Zurich,
    where he worked on optimal control for dynamical systems and sequence model
    architectures. His research spans various domains, including robotics,
    dynamical systems, and artificial intelligence. Jerome has published
    several papers on control theory and machine learning, contributing to
    advancements in predictive control and fundamental understanding of
    sequence models.

    You can find Jerome's latest work on [Google Scholar](https://scholar.google.com/citations?user=JHmSvaMAAAAJ&hl=en).
  research_interests: >-
    sequence model architectures, reasoning fundamentals, test-time RL, model
    normalization, optimization techniques, dynamical systems

- name: Stefano Viel
  role: AI Researcher
  image: /assets/images/stefano.jpeg
  image_style: ""
  bio: >-
    Stefano has a master's in data science from EPFL. There, he primarily
    conducted research on reinforcement learning, large language models, and
    computational social science.
  research_interests: >-
    reinforcement learning, unsupervised environment design, meta learning,
    synthetic data generation, curiosity-driven learning, and large language
    models

- name: Jeroen Cottaar
  role: AI Researcher
  image: /assets/images/jeroen.jpg
  image_style: "object-position: center 8%;"
  bio: >-
    Jeroen has a PhD in Applied Physics from Eindhoven University of
    Technology and over 10 years of industry experience at ASML, where he
    architected Bayesian machine learning approaches for semiconductor
    metrology. He is a top-5 Kaggle competitor with multiple 1st and 2nd place
    finishes across diverse domains, with solutions ranging from principled
    Bayesian inference to genetic algorithms with custom CUDA kernels. He now
    aims to merge Bayesian methods with LLM reasoning approaches.
  research_interests: >-
    reasoning, abstraction, test-time computation, program synthesis, Bayesian
    inference, Gaussian processes, scientific machine learning

- name: Tommy He
  role: AI Researcher
  image: /assets/images/tommy.jpg
  image_style: ""
  bio: >-
    Tommy has a Bachelor’s in math & computer science, worked on research in cryptography and ML, and previously co-founded YC company Clarum building AI agents for investing. His previous experience spans working on nanosecond HFT systems to privacy preserving ad-tech solutions.
  research_interests: >-
    reasoning, RL, self-play, interpretability, geometry of learning, mathematical foundations of learning systems

- name: Michal Tesnar
  role: AI Researcher
  image: /assets/images/michal.jpeg
  image_style: ""
  bio: >-
    Michal is pursuing a Master’s in Data Science at ETH, focusing on the mathematical foundations of the field and its applications to deep learning. He has conducted research on continual learning in robotics and reasoning with diffusion models. He maintains a broad focus, exploring human cognition and the impact of technology on the society.
  research_interests: >-
    reasoning, large-language model post-training, long-context agentic tasks, agentic orchestration, test-time scaling, and uncertainty estimation

- name: Victor Mercklé
  role: AI Researcher
  image: /assets/images/victor-merckle.webp
  image_style: ""
  bio: >-
    Victor is a machine learning researcher with a background in reinforcement
    learning and deep learning. He studied computer science at ENS Lyon. His
    work looks at the theory of neural network training, including how the
    geometry of data shapes optimization landscapes in ReLU networks. He has
    also worked on LLM systems, agents, and search methods for games and logic
    problems. Check out his work on his [website](https://victormerckle.fr).
  research_interests: >-
    unsupervised training, game AI, search, coding agents, mechanical sympathy,
    automating research

- name: Andrin Rehmann
  role: AI Researcher
  image: /assets/images/andrin.jpeg
  image_style: ""
  bio: >-
    Andrin has a master's in Computational Science from the University of
    Zurich and was most recently a research engineer at Pasteur Labs, where
    he worked on differentiable systems, inverse design, and neural
    surrogates. Previously he has dabbled in computer graphics,
    high-performance computing, and graph neural networks, and spent his
    university years simulating the universe — from GPU-accelerated N-body
    codes to predicting dark matter with neural networks. Find his work on
    [andrinrehmann.ch](https://andrinrehmann.ch).
  research_interests: >-
    scientific machine learning, test-time optimization, astrophysics,
    real-time rendering

- name: Angus Adams
  role: Head of Operations
  image: /assets/images/angus.jpg
  image_style: ""
  bio: >-
    Angus works on the operating layer around Tufa Labs' research: finance,
    legal and admin systems, hiring and relocation logistics, infrastructure
    procurement, and the internal tooling that helps the team move faster. He
    has a background in finance, company operations, and using AI agents to turn
    complex operational problems into reliable processes.
  focus_label: Focus
  research_interests: >-
    operations, finance and governance, team infrastructure, automation,
    agent-assisted workflows, vendor coordination
