<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" viewBox="0 0 680 774" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Orbit Wars model architecture</title>
<desc>Top-to-bottom flow. Entity tokens (planets, comets, fleets), observation-conditioned summary tokens, and learned latent tokens are represented in a shared 768-dimensional space, concatenated into one token sequence, and processed by a 38-block, 16-head residual transformer. The contextualized tokens are then read out by per-player actor heads (launch decision, target selection, fleet size) and a per-player critic head (win probability), all produced in a single forward pass.</desc>
<style>
  text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1F2937; }
  .t  { font-size: 14px; font-weight: 500; fill: #1F2937; }
  .ts { font-size: 12px; font-weight: 400; fill: #6B7280; }
  .c-blue  { fill: #DBEAFE; stroke: #2563EB; stroke-width: 1.25; }
  .c-amber { fill: #FEF3C7; stroke: #B45309; stroke-width: 1.25; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="774" fill="#FFFFFF"/>

<!-- header -->
<text class="th" x="40" y="50">Orbit Wars model architecture (~200M parameters)</text>
<rect class="c-blue" x="40" y="61" width="11" height="11" rx="2"/>
<text class="ts" x="57" y="71">shared backbone</text>
<rect class="c-amber" x="192" y="61" width="11" height="11" rx="2"/>
<text class="ts" x="209" y="71">per-player readout heads</text>

<!-- inputs row -->
<rect class="c-blue" x="40" y="92" width="290" height="96" rx="8"/>
<text class="t"  x="56" y="120">Entity tokens (variable count)</text>
<text class="ts" x="56" y="146">planets · comets · fleets</text>
<text class="ts" x="56" y="172">per-type MLP → 768-d</text>

<rect class="c-blue" x="350" y="92" width="290" height="96" rx="8"/>
<text class="t"  x="366" y="116">Special tokens (×17)</text>
<text class="ts" x="366" y="138">5 summary — observation-conditioned</text>
<text class="ts" x="366" y="160">4 plan · 4 value · 4 scratch</text>
<text class="ts" x="366" y="180">— learned latent tokens</text>

<!-- token sequence -->
<rect class="c-blue" x="40" y="206" width="600" height="36" rx="8"/>
<text class="t" x="340" y="229" text-anchor="middle">Token sequence — shared 768-d space (N entities + 17 special)</text>

<!-- trunk -->
<rect class="c-blue" x="40" y="272" width="600" height="92" rx="8"/>
<text class="t"  x="340" y="302" text-anchor="middle">38× transformer block</text>
<text class="ts" x="340" y="324" text-anchor="middle">16-head self-attention · layer norm</text>
<text class="ts" x="340" y="344" text-anchor="middle">MLP 768 → 1536 → 768 · residual</text>

<!-- actor column -->
<rect class="c-amber" x="40" y="400" width="290" height="74" rx="8"/>
<text class="t"  x="56" y="422">Actor — per planet and comet</text>
<text class="ts" x="56" y="444">+ player summary &amp; plan tokens</text>
<text class="ts" x="56" y="464">→ source / target MLPs</text>

<rect class="c-amber" x="40" y="484" width="290" height="46" rx="8"/>
<text class="t"  x="56" y="511">Launch?</text>

<rect class="c-amber" x="40" y="540" width="290" height="46" rx="8"/>
<text class="t"  x="56" y="567">Pick target</text>

<rect class="c-amber" x="40" y="596" width="290" height="56" rx="8"/>
<text class="t"  x="56" y="620">Fleet size</text>
<text class="ts" x="56" y="640">logistic mixture → [3, num_ships]</text>

<!-- critic column -->
<rect class="c-amber" x="350" y="400" width="290" height="56" rx="8"/>
<text class="t"  x="366" y="424">Critic — per player</text>
<text class="ts" x="366" y="444">4 value tokens → MLP</text>

<rect class="c-amber" x="350" y="466" width="290" height="56" rx="8"/>
<text class="t"  x="366" y="490">Win probability</text>
<text class="ts" x="366" y="510">softmax over surviving players</text>

<!-- summary bar -->
<rect class="c-blue" x="40" y="686" width="600" height="48" rx="8"/>
<text class="t"  x="340" y="708" text-anchor="middle">One forward pass → all players' actions + values</text>
<text class="ts" x="340" y="726" text-anchor="middle">2–4× less compute vs. one observation per player</text>

<!-- connectors -->
<g fill="none" stroke="#6B7280" stroke-width="1.5">
<line x1="185" y1="188" x2="185" y2="206" marker-end="url(#arrow)"/>
<line x1="495" y1="188" x2="495" y2="206" marker-end="url(#arrow)"/>
<line x1="340" y1="242" x2="340" y2="272" marker-end="url(#arrow)"/>
<line x1="185" y1="364" x2="185" y2="400" marker-end="url(#arrow)"/>
<line x1="495" y1="364" x2="495" y2="400" marker-end="url(#arrow)"/>
<line x1="185" y1="474" x2="185" y2="484" marker-end="url(#arrow)"/>
<line x1="185" y1="530" x2="185" y2="540" marker-end="url(#arrow)"/>
<line x1="185" y1="586" x2="185" y2="596" marker-end="url(#arrow)"/>
<line x1="185" y1="652" x2="185" y2="686" marker-end="url(#arrow)"/>
<line x1="495" y1="456" x2="495" y2="466" marker-end="url(#arrow)"/>
<line x1="495" y1="522" x2="495" y2="686" marker-end="url(#arrow)"/>
</g>
</svg>
